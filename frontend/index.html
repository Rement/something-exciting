<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>For You</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>

<div id="offline-banner" class="offline-banner">Offline</div>

<!-- PIN -->
<div id="screen-pin" class="screen">
  <div class="pin-container">
    <h1 class="app-title">For You</h1>
    <input id="pin-input" type="tel" inputmode="numeric"
           maxlength="4" autocomplete="off">
    <p id="pin-error" class="error"></p>
  </div>
</div>

<!-- Main -->
<div id="screen-main" class="screen">
  <div class="main-container">
    <div id="countdown" class="countdown"></div>
    <p id="status-line" class="status-line"></p>
    <div id="grid-container" class="grid-container">
      <img id="reveal-image" src="/image/reveal.jpg" alt="">
      <canvas id="scratch-canvas"></canvas>
    </div>
    <button id="reveal-btn" class="reveal-btn" hidden>Reveal</button>
    <p id="personal-message" class="personal-message" hidden></p>
  </div>
</div>

<!-- Admin -->
<div id="screen-admin" class="screen">
  <div class="admin-container">
    <h2 class="admin-title">Admin</h2>
    <div class="admin-status">
      <div>Scratched: <span id="admin-scratched">&mdash;</span></div>
      <div>Unlocked: <span id="admin-unlocked">&mdash;</span></div>
      <div>Revealed: <span id="admin-revealed">&mdash;</span></div>
      <div>Last scratch: <span id="admin-last-scratch">&mdash;</span></div>
      <div>Sim time: <span id="admin-current-time">&mdash;</span></div>
    </div>
    <div class="admin-actions">
      <button id="admin-force-reveal">Force Reveal</button>
      <button id="admin-reset">Reset All</button>
      <button id="admin-unlock-all">Unlock All Tiles</button>
      <button id="admin-lock-all">Lock All Tiles</button>
    </div>
    <div class="admin-sim">
      <label for="admin-sim-date">Simulate Date</label>
      <select id="admin-sim-date">
        <option value="">Real time</option>
        <option value="2026-05-11T21:00:00-07:00">Launch (May 11 9pm)</option>
        <option value="2026-05-12T12:00:00-07:00">Day 2 noon</option>
        <option value="2026-05-13T18:00:00-07:00">Day 3 6pm</option>
        <option value="2026-05-14T15:00:00-07:00">Day 4 3pm</option>
        <option value="2026-05-15T12:59:00-07:00">Reveal day 12:59pm</option>
        <option value="2026-05-15T13:01:00-07:00">Reveal day 1:01pm</option>
      </select>
    </div>
    <button id="admin-back" class="admin-back">Back to user view</button>
  </div>
</div>

<script type="module" src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>
</body>
</html>
