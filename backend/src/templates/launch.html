<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background-color:#080808;font-family:Georgia,'Times New Roman',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#080808;">
    <tr><td align="center" style="padding:48px 24px;">
      <table width="480" cellpadding="0" cellspacing="0">
        <tr><td style="text-align:center;padding-bottom:32px;">
          <span style="color:#c9a84c;font-size:28px;letter-spacing:2px;">{{appTitle}}</span>
        </td></tr>
        <tr><td style="color:#e8e0d0;font-size:18px;line-height:1.7;text-align:center;padding-bottom:40px;">
          Something special has been made just for you.<br>
          A little mystery that will unfold over the next few days.
        </td></tr>
        <tr><td align="center" style="padding-bottom:40px;">
          <a href="https://{{domain}}" style="display:inline-block;padding:14px 36px;background-color:#c9a84c;color:#080808;text-decoration:none;font-size:16px;font-weight:bold;letter-spacing:1px;">
            Open Your Gift
          </a>
        </td></tr>
        <tr><td style="border-top:1px solid #222;padding-top:24px;color:#666;font-size:12px;text-align:center;font-family:sans-serif;">
          Let me know if you'd like to stop receiving these.
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
